<!DOCTYPE html>
<html>

<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Payment</h1>

<form onsubmit="completePayment(event)">

<select id="paymentMethod">

<button type="submit">Pay Now</button>

</form>

<script src="script.js"></script>

</body>
</html>
